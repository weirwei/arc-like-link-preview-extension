<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
    }
    .header {
      font-size: 14px;
      font-weight: 600;
      color: #222;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 13px;
      color: #444;
    }
    /* toggle switch */
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #5856d6;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 12px 0;
    }
    .section-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .radio-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    .radio-row input[type="radio"] {
      accent-color: #5856d6;
      margin: 0;
    }
    .radio-label {
      font-size: 13px;
      color: #444;
    }
    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .shortcut-input {
      font: 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      color: #333;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 4px 10px;
      min-width: 60px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .shortcut-input:focus {
      border-color: #5856d6;
      box-shadow: 0 0 0 2px rgba(88, 86, 214, 0.2);
    }
    .shortcut-input.recording {
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header" data-i18n="popupHeader"></div>
  <div class="row">
    <span class="label" data-i18n="enablePreview"></span>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="divider"></div>
  <div class="section-label" data-i18n="interceptMode"></div>
  <label class="radio-row">
    <input type="radio" name="mode" value="newTabOnly">
    <span class="radio-label" data-i18n="modeNewTabOnly"></span>
  </label>
  <label class="radio-row">
    <input type="radio" name="mode" value="all">
    <span class="radio-label" data-i18n="modeAll"></span>
  </label>
  <div class="divider"></div>
  <div class="row">
    <span class="label" data-i18n="autoOpenBlocked"></span>
    <label class="toggle">
      <input type="checkbox" id="autoOpen">
      <span class="slider"></span>
    </label>
  </div>
  <div class="divider"></div>
  <div class="section-label" data-i18n="shortcutLabel"></div>
  <div class="shortcut-row">
    <span class="label" data-i18n="openInNewTab"></span>
    <kbd class="shortcut-input" id="shortcutKey" tabindex="0"></kbd>
  </div>
  <script src="popup.js"></script>
</body>
</html>
